  #suspicious tuk tuk detection
  /alerts/suspicious:
    get:
      summary: Get all suspicious vehicles with anomaly patterns
      description: |
        Returns vehicles that have triggered anomaly flags from the
        pattern detection engine.
      operationId: getSuspiciousVehicles
      tags:
        - Alerts
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum:
              - NIGHT_MOVEMENT
              - SPEEDING
              - BOUNDARY_CROSS
              - STATIONARY
              - ERRATIC
          description: Filter by specific anomaly type
          example: SPEEDING
        - in: query
          name: since
          schema:
            type: string
            format: date-time
          description: |
            Only return anomalies detected after this timestamp.
          example: "2025-04-20T00:00:00Z"
      responses:
        '200':
          description: Suspicious vehicles grouped and sorted by severity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsResponse'
              examples:
                all_suspicious:
                  summary: All suspicious vehicles (no filter)
                  value:
                    success: true
                    totalSuspiciousVehicles: 40
                    anomalySummary:
                      NIGHT_MOVEMENT: 8
                      SPEEDING: 8
                      BOUNDARY_CROSS: 8
                      STATIONARY: 8
                      ERRATIC: 8
                    filters:
                      type: all
                      since: all time
                      scope: hq_admin
                    data:
                      - vehicleId: 64a1f2b3c4d5e6f7a8b9c0d5
                        registrationNumber: REG101
                        vehicleStatus: active
                        vehicleColor: Yellow
                        assignedDistrict: Colombo
                        latestAnomalyType: SPEEDING
                        anomalyTypes:
                          - SPEEDING
                          - NIGHT_MOVEMENT
                        totalAnomalyCount: 24
                        severityScore: 2
                        lastSeenAt: "2025-04-24T10:23:00.000Z"
                        lastKnownLocation:
                          latitude: 6.9271
                          longitude: 79.8612
                        lastSpeed: 95
                      - vehicleId: 64a1f2b3c4d5e6f7a8b9c0d6
                        registrationNumber: REG116
                        vehicleStatus: active
                        vehicleColor: Blue
                        assignedDistrict: Kandy
                        latestAnomalyType: BOUNDARY_CROSS
                        anomalyTypes:
                          - BOUNDARY_CROSS
                        totalAnomalyCount: 11
                        severityScore: 1
                        lastSeenAt: "2025-04-24T09:15:00.000Z"
                        lastKnownLocation:
                          latitude: 7.8500
                          longitude: 81.1200
                        lastSpeed: 32
                speeding_only:
                  summary: Only speeding vehicles
                  value:
                    success: true
                    totalSuspiciousVehicles: 8
                    anomalySummary:
                      NIGHT_MOVEMENT: 0
                      SPEEDING: 8
                      BOUNDARY_CROSS: 0
                      STATIONARY: 0
                      ERRATIC: 0
                    filters:
                      type: SPEEDING
                      since: all time
                      scope: hq_admin
                    data:
                      - registrationNumber: REG102
                        latestAnomalyType: SPEEDING
                        anomalyTypes:
                          - SPEEDING
                        totalAnomalyCount: 18
                        severityScore: 1
                        lastSpeed: 112
        '400':
          description: Invalid anomaly type provided in ?type parameter
          content:
            application/json:
              example:
                success: false
                message: "Invalid anomaly type. Valid types: NIGHT_MOVEMENT, SPEEDING, BOUNDARY_CROSS, STATIONARY, ERRATIC"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

