              driver: 19627845V
              district: Galle
              province: Western
              deviceId: DEV-09999
              color: Yellow
              year: 2019
      responses:
        '201':
          description: Vehicle created successfully
          content:
            application/json:
              example:
                success: true
                data:
                  _id: 64a1f2b3c4d5e6f7a8b9c0d5
                  registrationNumber: REG301
                  status: active
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'


  /tuktuks/{registrationNumber}:
    get:
