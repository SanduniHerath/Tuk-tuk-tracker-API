          example: active
        - in: query
          name: district
          schema:
            type: string
          description: Filter by district name
          example: Galle
        - in: query
          name: province
          schema:
            type: string
          description: Filter by province name
          example: Southern
        - in: query
          name: color
          schema:
            type: string
          description: Filter by vehicle color
          example: Yellow
        - $ref: '#/components/parameters/sortParam'
        - $ref: '#/components/parameters/fieldsParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
      responses:
        '200':
          description: List of vehicles matching the filters
          content:
            application/json:
