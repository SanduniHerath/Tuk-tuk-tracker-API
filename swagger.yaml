        Links to an existing driver via `driver` field (MongoDB ObjectId).

        **Allowed roles:** `hq_admin`, `tuk_tuk_operator`
      operationId: createVehicle
      tags:
        - Vehicles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVehicleRequest'
